<html lang="fr">
<head>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>

            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.95);

            color: white;

            z-index: 3000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            border-bottom: 1px solid var(--border-color);
        }

        .controls-container { display: flex; gap: 15px; align-items: flex-end; }
        .label { font-size: 0.65rem; text-transform: uppercase; color: #38bdf8; font-weight: bold; margin-bottom: 4px; }

        /* --- ÉLÉMENTS DE FORMULAIRE --- */
        select, input { 
            height: 34px; padding: 0 10px; border-radius: 4px; border: 1px solid #334155;

<body>

<div id="header">
    <div style="font-weight: 900; letter-spacing: 1px;">SNSM | SYSTEME DE MISSION</div>
    <div class="controls-container">
        <div class="control-group">
            <div class="label">Navire</div>
            <select id="shipSelector" onchange="calculate()">
                <option value="nsc3" selected>NSC3 (6.4m)</option>
                <option value="nsh1">NSH1 (17.5m)</option>
            </select>
        </div>
        <div class="control-group">
            <div class="label">Vitesse</div>
            <select id="vSelector" onchange="calculate()">
                <option value="v15" selected>15 kts</option>
                <option value="v20">20 kts</option>
            </select>
        </div>
        <div class="control-group">
            <div class="label">Etat Mer</div>
            <div class="btn-group">
                <button class="sea-btn active" onclick="setSea(0, this)">Calme</button>
                <button class="sea-btn" onclick="setSea(1, this)">Agitée</button>
            </div>
        </div>
        <div class="control-group">
            <label class="tow-label"><input type="checkbox" id="towCheck" onchange="calculate()"> REMORQUAGE</label>
        </div>
    </div>
</div>

<div id="map-container">
    <div id="map"></div>

    <div class="floating-card sar-card" id="sarCard">
        <h4>CALCUL DE DÉRIVE (SAR)</h4>
        <div class="stat-row">
            <span>Type de cible :</span>
            <select id="targetType" onchange="updateDrift()">
                <option value="0.05">Plaisance (moteur)</option>
                <option value="0.01">Homme à la mer</option>
            </select>
        </div>
        <div class="stat-row">
            <span>Courant Dir :</span>
            <input type="number" id="curDir" placeholder="°" style="width:60px;" onchange="updateDrift()">
        </div>
        <div class="stat-row">
            <span>Courant Vit :</span>
            <input type="number" id="curSpeed" placeholder="nds" style="width:60px;" onchange="updateDrift()">
        </div>
        <div style="background: rgba(239, 68, 68, 0.1); padding: 8px; border-radius: 4px; margin: 10px 0; border: 1px solid rgba(239, 68, 68, 0.2);">
            <div class="stat-row" style="margin-bottom:0;">
                <span>Vitesse Dérive :</span>
                <b id="driftTotal" style="color:#fca5a5;">-- nds</b>
            </div>
        </div>
        <div class="stat-row"><span>Heure LKP :</span><input type="time" id="timeLKP" onchange="updateDrift()"></div>
        <div class="stat-row"><span>Heure Départ :</span><input type="time" id="timeDepart" onchange="updateDrift()"></div>
        <button class="btn-sar-action" onclick="startSarMission()">Placer LKP</button>
    </div>

    <div class="floating-card dashboard">
        <h4>ÉTAT DU NAVIRE</h4>
        <div class="dash-grid">
            <div class="dash-item"><span class="label">Unité</span><b id="dashShip">--</b></div>
            <div class="dash-item"><span class="label">Vitesse</span><b id="dashSpeed">--</b></div>
            <div class="dash-item"><span class="label">Autonomie</span><b id="dashRange">--</b></div>
            <div class="dash-item"><span class="label">Conso</span><b id="dashCons">--</b></div>
        </div>
    </div>
</div>

<script>
    // --- RESTAURATION DE TA LOGIQUE JS V10 ---
    const fleet = {
        nsc3: { name: "NSC3", vMax: 30, rangeNominal: 6, towPenalty: 1.7, cons: "25 L/h" },
        nsh1: { name: "NSH1", vMax: 25, rangeNominal: 50, towPenalty: 1.4, cons: "180 L/h" }
    };

    let currentSea = 0;
    let vsdMarker = null;

    const map = L.map('map', { zoomControl: false }).setView([47.8012, -3.7429], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function calculate() {
        const ship = fleet[document.getElementById('shipSelector').value];
        let vBase = parseInt(document.getElementById('vSelector').value.replace('v',''));
        let finalV = Math.min(vBase, ship.vMax);
        
        document.getElementById('dashShip').innerText = ship.name;
        document.getElementById('dashSpeed').innerText = finalV + " kts";
        document.getElementById('dashRange').innerText = ship.rangeNominal + " MN";
        document.getElementById('dashCons').innerText = ship.cons;
    }

    function updateDrift() {
        const cSpeed = parseFloat(document.getElementById('curSpeed').value) || 0;
        document.getElementById('driftTotal').innerText = cSpeed.toFixed(1) + " nds";
    }

    function startSarMission() {
        map.getContainer().style.cursor = 'crosshair';
        map.once('click', function(e) {
            if(vsdMarker) map.removeLayer(vsdMarker);
            vsdMarker = L.marker(e.latlng, {draggable: true}).addTo(map);
            map.getContainer().style.cursor = '';
        });
    }

    function setSea(val, btn) {
        currentSea = val;
        document.querySelectorAll('.sea-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calculate();
    }

    // --- TON DRAG AND DROP D'ORIGINE ---
    function makeDraggable(el) {
        const header = el.querySelector('h4');
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        header.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }

    window.onload = () => {
        document.querySelectorAll('.floating-card').forEach(makeDraggable);
        calculate();
    };
</script>
</body>
</html>
