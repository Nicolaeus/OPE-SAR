<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="OPE-SAR">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>OPE-SAR</title>

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/images/logos/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <link rel="stylesheet" href="./assets/css/app.css">
    <link rel="stylesheet" href="./assets/css/header.css">
    <link rel="stylesheet" href="./src/shared/ui/splash/splash.css">
    <link rel="stylesheet" href="./src/shared/ui/wizard/wizard.css">
    <link rel="stylesheet" href="./src/shared/ui/navigation/MoreMenu.css">
    <link rel="stylesheet" href="./assets/css/bottom-navigation.css">
    <link rel="stylesheet" href="./assets/css/map-overlay.css">
    <link rel="stylesheet" href="./src/modules/map/assets/css/map-info-widget.css">
    <link rel="stylesheet" href="./assets/css/cards.css">
    <link rel="stylesheet" href="./assets/css/tide.css">
    <link rel="stylesheet" href="./src/modules/sar/assets/css/sar.css">
    <link rel="stylesheet" href="./src/modules/osc/assets/css/osc.css">

</head>

<body>

    <div id="app">
        <div id="map"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        (function(){
          const el = document.createElement('div');
          el.style.cssText = `
            position:fixed; top:50%; left:0; right:0;
            transform:translateY(-50%);
            background:yellow; color:black;
            font-size:14px; font-family:monospace;
            z-index:9999999; padding:10px; white-space:pre-wrap;
          `;
          function report(){
            el.textContent =
                'Test: ' + 'Coucou' +
              'innerHeight: ' + window.innerHeight + '\n' +
              'clientHeight (html): ' + document.documentElement.clientHeight + '\n' +
              'visualViewport.height: ' + (window.visualViewport ? window.visualViewport.height : 'n/a') + '\n' +
              'body height: ' + document.body.getBoundingClientRect().height + '\n' +
              'sab (env bottom): ' + getComputedStyle(document.documentElement).getPropertyValue('--sab-test');
          }
          document.documentElement.style.setProperty('--sab-test', 'env(safe-area-inset-bottom)');
          document.body.appendChild(el);
          report();
          window.addEventListener('resize', report);
        })();
    </script>
    
    <script type="module" src="./src/bootstrap.js"></script>

</body>

</html>
